<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chicago Crime Analysis &middot; 2025&ndash;2026</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #161b22; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    select {
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    button { cursor: pointer; }

    /* Grid helpers */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 16px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    /* Card */
    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 20px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #f0f6fc;
      margin-bottom: 3px;
    }
    .card-sub {
      font-size: 11px;
      color: #6e7681;
      margin-bottom: 14px;
    }

    /* Insight box */
    .insight {
      margin-top: 12px;
      padding: 8px 12px;
      background: #0d1117;
      border-radius: 8px;
      border: 1px solid #21262d;
      font-size: 11px;
      color: #8b949e;
      line-height: 1.6;
    }

    /* KPI */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .kpi-label {
      font-size: 10px;
      color: #8b949e;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }
    .kpi-value {
      font-size: 22px;
      font-weight: 700;
      color: #58a6ff;
      margin: 4px 0 2px;
      font-family: 'ui-monospace', Menlo, Consolas, monospace;
    }
    .kpi-sub {
      font-size: 10px;
      color: #484f58;
    }

    /* Progress bar */
    .bar-track {
      height: 6px;
      background: #21262d;
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* Separator */
    .sep {
      height: 1px;
      background: #21262d;
      margin: 6px 0;
    }

    /* Ward buttons */
    .ward-btn {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      transition: all 0.15s;
      outline: none;
    }

    /* Location card */
    .loc-card {
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .loc-pct { font-size: 18px; font-weight: 700; color: #58a6ff; }
    .loc-name { font-size: 9px; color: #8b949e; margin: 3px 0 1px; text-transform: uppercase; letter-spacing: 0.5px; }
    .loc-count { font-size: 10px; color: #484f58; }

    /* Footer */
    .footer {
      margin-top: 40px;
      padding: 16px 0;
      border-top: 1px solid #21262d;
      text-align: center;
      font-size: 11px;
      color: #484f58;
    }

    /* Section header */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 28px 0 14px;
    }
    .section-tag {
      font-size: 10px;
      color: #8b949e;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .section-line {
      flex: 1;
      height: 1px;
      background: #21262d;
    }
  </style>
</head>

          {/* ─── SECCIÓN B ─── */}
          <div className="section-header">
            <span className="section-tag">Tipolog&iacute;a & Geografía</span>
            <div className="section-line" />
          </div>

          <div className="grid-2" style={{ marginBottom:16 }}>

            {/* Q2 · Tasa Arresto por Tipo */}
            <div className="card">
              <div className="card-title">&#9313;&nbsp; Tasa de Arresto por Tipo de Crimen</div>
              <div className="card-sub">Solo tipos con &gt;100 incidentes &middot; ordenado por tasa descendente</div>
              <div style={{ display:"flex", gap:8, marginBottom:10, flexWrap:"wrap" }}>
                {[["#2ea043","\u226570%"],["#d29922","30\u201370%"],["#f4a261","10\u201330%"],["#f85149","<10%"]].map(([c,l])=>(
                  <span key={l} style={{ display:"flex", alignItems:"center", gap:4, fontSize:10, color:"#6e7681" }}>
                    <span style={{ width:8, height:8, background:c, borderRadius:2, display:"inline-block" }} />
                    {l}
                  </span>
                ))}
              </div>
              <div style={{ overflowY:"auto", maxHeight:340 }}>
                {Q2.map((c, i) => (
                  <div key={i} style={{ display:"flex", alignItems:"center", gap:8, padding:"5px 0",
                                        borderBottom:"1px solid #21262d" }}>
                    <span style={{ fontSize:10, color:"#484f58", width:18, textAlign:"right", flexShrink:0 }}>
                      {i+1}
                    </span>
                    <span style={{ fontSize:11, color:"#e6edf3", width:148, flexShrink:0 }}>{c.name}</span>
                    <div style={{ flex:1, height:5, background:"#21262d", borderRadius:3, overflow:"hidden" }}>
                      <div className="bar-fill" style={{ width:`${c.rate}%`, background:rateColor(c.rate) }} />
                    </div>
                    <span style={{ fontSize:11, fontWeight:700, color:rateColor(c.rate), width:40, textAlign:"right" }}>
                      {c.rate}%
                    </span>
                    <span style={{ fontSize:10, color:"#484f58", width:38, textAlign:"right" }}>
                      {fmt(c.total)}
                    </span>
                  </div>
                ))}
              </div>
            </div>

            {/* Q3 · Ward Evolution */}
            <div className="card">
              <div className="card-title">&#9314;&nbsp; Evoluci&oacute;n Mensual por Ward</div>
              <div className="card-sub">Window function LAG() &mdash; selecciona wards para comparar</div>
              <div style={{ display:"flex", gap:6, marginBottom:12, flexWrap:"wrap" }}>
                {Object.entries(WARD_COLORS).map(([w, c]) => (
                  <button key={w} className="ward-btn" onClick={() => toggle(w)} style={{
                    background: activeWards.has(w) ? c : "transparent",
                    color:      activeWards.has(w) ? "#0d1117" : c,
                    border:     `1.5px solid ${c}`,
                  }}>
                    Ward {w.slice(1)}
                  </button>
                ))}
              </div>
              <ResponsiveContainer width="100%" height={270}>
                <LineChart data={Q3} margin={{ top:4, right:8, bottom:0, left:0 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#21262d" vertical={false} />
                  <XAxis dataKey="month" tick={{ fill:"#8b949e", fontSize:10 }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fill:"#8b949e", fontSize:10 }} axisLine={false} tickLine={false} tickFormatter={fmt} />
                  <Tooltip contentStyle={{ background:"#0d1117", border:"1px solid #30363d",
                    borderRadius:8, fontSize:11 }} />
                  {Object.entries(WARD_COLORS).map(([w, c]) =>
                    activeWards.has(w)
                      ? <Line key={w} type="monotone" dataKey={w} name={`Ward ${w.slice(1)}`}
                          stroke={c} strokeWidth={2} dot={false} activeDot={{ r:4, fill:c }} />
                      : null
                  )}
                </LineChart>
              </ResponsiveContainer>
              <div className="insight">
                <strong style={{ color:"#E63946" }}>Ward 27 y 28</strong> superan 1,000 incidentes/mes en verano.
                <strong style={{ color:"#8D99AE" }}> Ward 50</strong> es el m&aacute;s estable (&plusmn;60 mensuales).
              </div>
            </div>
          </div>

          {/* ─── SECCIÓN C ─── */}
          <div className="section-header">
            <span className="section-tag">Microgeografía & Contexto</span>
            <div className="section-line" />
          </div>

          <div className="grid-2" style={{ marginBottom:16 }}>

            {/* Q5 · Beats por Distrito */}
            <div className="card">
              <div className="card-title">&#9316;&nbsp; Top 3 Beats por Distrito</div>
              <div className="card-sub">Zonas de patrullaje con m&aacute;s incidentes &middot; ROW_NUMBER() OVER (PARTITION BY distrito)</div>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
                <span style={{ fontSize:11, color:"#8b949e", flexShrink:0 }}>Distrito:</span>
                <div style={{ position:"relative", flex:1 }}>
                  <select value={district} onChange={e=>setDistrict(e.target.value)} style={{
                    width:"100%", padding:"7px 28px 7px 10px", fontSize:12,
                    background:"#0d1117", color:"#58a6ff",
                    border:"1px solid #30363d", borderRadius:6, outline:"none",
                  }}>
                    {Object.keys(Q5).map(d => <option key={d} value={d}>Distrito {d}</option>)}
                  </select>
                  <span style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)",
                                  color:"#6e7681", pointerEvents:"none", fontSize:10 }}>&#9660;</span>
                </div>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                {beats.map((b, i) => (
                  <div key={b.beat}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5, fontSize:12 }}>
                      <span>
                        <span style={{ color: i===0?"#f85149":i===1?"#d29922":"#8b949e", marginRight:6, fontWeight:700 }}>
                          #{i+1}
                        </span>
                        Beat <strong style={{ color:"#e6edf3" }}>{b.beat}</strong>
                      </span>
                      <span style={{ color:"#58a6ff", fontWeight:700 }}>{fmtN(b.n)}</span>
                    </div>
                    <div className="bar-track" style={{ height:8 }}>
                      <div className="bar-fill" style={{
                        width:`${(b.n/maxBeat)*100}%`,
                        background: i===0?"#f85149":i===1?"#d29922":"#1f6feb",
                      }} />
                    </div>
                  </div>
                ))}
              </div>
              <div className="insight">
                Cada beat representa la unidad m&aacute;s peque&ntilde;a de patrullaje policial.
                Dentro de cada distrito, el beat 1 concentra entre 1.1&ndash;1.6x m&aacute;s incidentes que el 3.
              </div>
            </div>

            {/* Q7 · Ubicaciones */}
            <div className="card">
              <div className="card-title">&#9319;&nbsp; Cr&iacute;menes por Tipo de Ubicaci&oacute;n</div>
              <div className="card-sub">Top 10 ubicaciones &middot; porcentaje del total hist&oacute;rico</div>
              <div className="grid-3" style={{ gap:8 }}>
                {Q7.map((u, i) => {
                  const colors = ["#58a6ff","#79c0ff","#a5d6ff","#cae8ff","#d2a8ff","#d2a8ff","#ffa657","#ffa657","#6e7681","#484f58"];
                  return (
                    <div className="loc-card" key={u.loc}>
                      <div className="loc-pct" style={{ color:colors[i] }}>{u.pct}%</div>
                      <div className="loc-name">{u.loc}</div>
                      <div className="loc-count">{(u.n/1000).toFixed(1)}k casos</div>
                    </div>
                  );
                })}
              </div>
              <div className="insight" style={{ marginTop:12 }}>
                <strong style={{ color:"#58a6ff" }}>STREET + APARTMENT</strong> suman el 46.7% de todos los delitos.
                Los espacios p&uacute;blicos (STREET, SIDEWALK, ALLEY) concentran el 34.3%.
              </div>
            </div>
          </div>

          {/* FOOTER */}
          <div className="footer">
            Proyecto Final BD COM-12101-2 &middot;
            7 queries anal&iacute;ticas &middot;
            Window functions: RANK, LAG, ROW_NUMBER &middot;
            232,593 registros &middot;
            Normalizado 4FN &middot;
            PostgreSQL
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
  </script>
</body>
</html>
